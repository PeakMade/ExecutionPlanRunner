{% extends "base.html" %}
{% block content %}

<div class="page-header flex items-center gap-3" style="flex-wrap:wrap;">
  <a href="{{ url_for('loadrunner.index') }}" class="btn btn-secondary btn-sm btn-icon">
    <i class="bi bi-arrow-left"></i>
  </a>
  <div class="flex items-center gap-3" style="flex:1; flex-wrap:wrap;">
    <h1 style="margin:0; font-size:1.2rem;">Run <code style="font-size:1rem;">{{ run_id[:8] }}…</code></h1>
    <span id="run-status-badge" class="badge badge-running" style="font-size:0.85rem; padding:0.3rem 0.85rem;">RUNNING</span>
    <span id="run-elapsed" class="text-sm text-muted"></span>
  </div>
  <a href="{{ url_for('loadrunner.tools_page') }}" class="btn btn-secondary btn-sm">
    <i class="bi bi-tools"></i> Tools
  </a>
</div>

<div style="display:grid; grid-template-columns:1fr 300px; gap:1rem; align-items:start;">

  <!-- Steps table -->
  <div class="card">
    <div class="card-header flex justify-between items-center">
      <span><i class="bi bi-list-check"></i> Steps</span>
      <span id="progress-label" class="text-sm text-muted"></span>
    </div>
    <div class="table-wrap" style="max-height:480px; overflow-y:auto;">
      <table class="data-table" style="min-width:700px;">
        <thead>
          <tr>
            <th style="width:60px;">ID</th>
            <th>Step Name</th>
            <th style="width:50px;">Type</th>
            <th style="width:100px;">Database</th>
            <th style="width:120px;">Status</th>
            <th style="width:70px;">Duration</th>
          </tr>
        </thead>
        <tbody id="steps-body">
          <tr>
            <td colspan="6" style="text-align:center; padding:2rem; color:var(--text-muted);">
              Connecting…
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Summary + log -->
  <div style="display:flex; flex-direction:column; gap:1rem;">
    <!-- Summary -->
    <div class="card">
      <div class="card-header">Summary</div>
      <div class="card-body" style="display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem;">
        <div class="stat-card">
          <div class="stat-value" style="color:#22c55e; font-size:1.8rem;" id="sum-success">—</div>
          <div class="stat-label">Success</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:#ef4444; font-size:1.8rem;" id="sum-failed">—</div>
          <div class="stat-label">Failed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:var(--text-muted); font-size:1.8rem;" id="sum-skipped">—</div>
          <div class="stat-label">Skipped</div>
        </div>
      </div>
    </div>
    <!-- Log -->
    <div class="card" style="flex:1;">
      <div class="card-header flex justify-between items-center">
        <span>Log</span>
        <button class="btn btn-secondary btn-sm" style="font-size:.7rem; padding:2px 8px;"
                onclick="document.getElementById('log-terminal').innerHTML=''">Clear</button>
      </div>
      <div class="card-body" style="padding:0.5rem;">
        <div class="log-terminal" id="log-terminal"></div>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
const RUN_ID    = "{{ run_id }}";
const STREAM_URL = "{{ url_for('loadrunner.stream_run', run_id=run_id) }}";
const TYPE_CLS  = { SP:'badge-blue', PL:'badge-purple', DF:'badge-teal' };

let stepsData   = {};
let runStart    = Date.now();
let runDone     = false;
let elapsedTmr  = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addLog(msg, cls='') {
  const el  = document.getElementById('log-terminal');
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function setRunBadge(status) {
  const b = document.getElementById('run-status-badge');
  b.textContent = status;
  b.className   = 'badge ' + {
    RUNNING:'badge-running', SUCCESS:'badge-success',
    FAILED:'badge-failed', HALTED:'badge-amber', ERROR:'badge-failed',
  }[status] || 'badge-gray';
}

function updateProgress() {
  const total = Object.keys(stepsData).length;
  const done  = Object.values(stepsData).filter(s => s.done).length;
  document.getElementById('progress-label').textContent = total ? `${done} / ${total}` : '';
}

function buildRows(steps) {
  const tbody = document.getElementById('steps-body');
  tbody.innerHTML = '';
  steps.forEach(s => {
    stepsData[s.id] = { name: s.name, type: s.type, db: s.db, done: false };
    const bdg = TYPE_CLS[s.type] || 'badge-gray';
    const tr = document.createElement('tr');
    tr.id        = 'row-' + s.id;
    tr.className = 'step-row';
    tr.innerHTML = `
      <td class="text-sm text-muted">${s.id}</td>
      <td id="name-${s.id}" class="text-sm truncate" style="max-width:280px;" title="${esc(s.name)}">${esc(s.name)}</td>
      <td><span class="badge ${bdg}" style="font-size:.68rem;">${s.type}</span></td>
      <td class="text-xs text-muted">${esc(s.db||'')}</td>
      <td id="status-${s.id}">
        <span class="step-dot dot-pending" style="margin-right:4px;"></span><small>Pending</small>
      </td>
      <td id="dur-${s.id}" class="text-xs text-muted">—</td>`;
    tbody.appendChild(tr);
  });
  updateProgress();
}

function setStep(exec_id, dotCls, label, rowCls) {
  const sEl = document.getElementById('status-' + exec_id);
  const rEl = document.getElementById('row-'    + exec_id);
  if (sEl) sEl.innerHTML = `<span class="step-dot ${dotCls}" style="margin-right:4px;"></span><small>${label}</small>`;
  if (rEl) {
    rEl.className = 'step-row';
    if (rowCls === 'running') rEl.scrollIntoView({ block:'nearest', behavior:'smooth' });
  }
}

let evtSource = null;

function connect(fromPos) {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(STREAM_URL + '?from=' + fromPos);
  let pos = fromPos;

  evtSource.onmessage = function(e) {
    pos++;
    const msg = JSON.parse(e.data);
    if (msg.type === 'ping') return;

    if (msg.type === 'steps') {
      buildRows(msg.steps);
      addLog(`▸ ${msg.steps.length} steps loaded`, 'log-info');

    } else if (msg.type === 'log') {
      addLog(msg.msg);

    } else if (msg.type === 'step_start') {
      setStep(msg.exec_id, 'dot-running', 'Running…', 'running');
      const s = stepsData[msg.exec_id];
      addLog(`▸ [${msg.exec_id}] ${s ? s.name : ''}`, 'log-info');

    } else if (msg.type === 'step_done') {
      const ok = msg.status === 'SUCCESS', sk = msg.status === 'SKIPPED';
      setStep(msg.exec_id,
        ok ? 'dot-success' : sk ? 'dot-skipped' : 'dot-failed',
        msg.status, ok ? 'success' : sk ? 'skipped' : 'failed');
      const dEl = document.getElementById('dur-' + msg.exec_id);
      if (dEl) dEl.textContent = msg.duration + 's';
      if (stepsData[msg.exec_id]) stepsData[msg.exec_id].done = true;
      if (msg.error) {
        const nEl = document.getElementById('name-' + msg.exec_id);
        if (nEl) nEl.insertAdjacentHTML('beforeend',
          `<div class="text-xs" style="color:#f85149;margin-top:2px;">${esc(msg.error.slice(0,200))}</div>`);
        addLog(`  ✗ ${msg.error.slice(0,120)}`, 'log-error');
      }
      updateProgress();

    } else if (msg.type === 'pipeline') {
      addLog(`  ↳ ${msg.msg}`, 'log-info');
    } else if (msg.type === 'retry') {
      setStep(msg.exec_id, 'dot-running', `Retry ${msg.attempt}`, 'running');
      addLog(`  ↺ Retry [${msg.exec_id}] attempt ${msg.attempt}`, 'log-warn');
    } else if (msg.type === 'halt') {
      addLog(`⚑ ${msg.msg}`, 'log-warn');
    } else if (msg.type === 'error') {
      addLog(`✗ ${msg.msg}`, 'log-error');
    } else if (msg.type === 'done') {
      runDone = true; evtSource.close();
      setRunBadge(msg.status);
      document.getElementById('sum-success').textContent = msg.success;
      document.getElementById('sum-failed').textContent  = msg.failed;
      document.getElementById('sum-skipped').textContent = msg.skipped;
      const elapsed = Math.round((Date.now() - runStart) / 1000);
      document.getElementById('run-elapsed').textContent = `${elapsed}s`;
      if (elapsedTmr) clearInterval(elapsedTmr);
      addLog(`\n● ${msg.status} — ${msg.success}✓ ${msg.failed}✗ ${msg.skipped}– (${elapsed}s)`,
             msg.status === 'SUCCESS' ? 'log-success' : 'log-error');
    }
  };

  evtSource.onerror = function() {
    if (!runDone) { evtSource.close(); setTimeout(() => connect(pos), 3000); }
  };
}

elapsedTmr = setInterval(() => {
  if (!runDone) {
    const s = Math.round((Date.now() - runStart) / 1000);
    document.getElementById('run-elapsed').textContent = `${s}s`;
  }
}, 1000);

connect(0);
</script>
{% endblock %}
